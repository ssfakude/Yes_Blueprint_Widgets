<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiber Service Widget</title>
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      padding-bottom: 0;
      font-size: 13px;
      color: #3d3d3d;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-icon svg { width: 16px; height: 16px; display: block; }
    .section-title {
      font-size: 11px; font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .section-line { flex: 1; height: 1px; background: #d0d0d0; }

    /* ── Card wrapper ── */
    .card-wrapper {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Card ── */
    .zoho-card {
      background: #fff;
      overflow: hidden;
    }

    /* ── Card header ── */
    .card-header {
      background: #3a9e5f;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .card-header.inactive { background: #c0392b; }

    .card-header-left { display: flex; align-items: center; gap: 10px; }
    .pulse-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #7ef5bb;
      flex-shrink: 0;
    }
    .pulse-dot.inactive { background: #f1948a; }

    .header-title { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.3; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }

    .header-badge {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px; font-weight: 700;
      color: #fff; letter-spacing: 0.06em;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Fields grid ── */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .field-cell {
      padding: 14px 18px;
      border-bottom: 1px solid #efefef;
      border-right: 1px solid #efefef;
    }
    .field-cell:nth-child(even)       { border-right: none; }
    .field-cell:nth-last-child(-n+2)  { border-bottom: none; }

    .field-label {
      font-size: 10px; font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
    .field-value {
      font-size: 13px; font-weight: 600;
      color: #222;
      display: flex; align-items: center; gap: 6px;
    }
    .field-value.muted { font-weight: 400; color: #555; }

    /* ── Available badge ── */
    .confirmed-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #e6f4ec;
      border: 1px solid #a8d5b8;
      border-radius: 4px;
      padding: 3px 9px;
      font-size: 12px; font-weight: 700;
      color: #2a7a48;
    }
    .check-circle {
      width: 15px; height: 15px;
      background: #3a9e5f;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .check-circle svg { width: 8px; height: 8px; }

    /* ── Speed tags ── */
    .speed-tag {
      display: inline-block;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      padding: 2px 9px;
      font-size: 13px; font-weight: 700;
      color: #3b4fce;
    }
    .speed-tag.copper {
      background: #fffbeb;
      border-color: #fcd34d;
      color: #92600a;
    }

    /* ── Card footer ── */
    .card-footer {
      background: #fafafa;
      border-top: 1px solid #efefef;
      padding: 8px 18px;
      display: flex; align-items: center; gap: 7px;
    }
    .footer-dot  { width: 7px; height: 7px; border-radius: 50%; background: #3a9e5f; flex-shrink: 0; }
    .footer-text { font-size: 11px; color: #999; }

    /* ── Action bar ── */
    .card-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
    }

    .btn-cancel {
      padding: 8px 28px;
      font-family: 'Lato', Arial, sans-serif;
      font-size: 13px; font-weight: 600;
      color: #444;
      background: #fff;
      border: 1.5px solid #c8c8c8;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      min-width: 90px;
    }
    .btn-cancel:hover  { background: #f5f5f5; border-color: #aaa; }
    .btn-cancel:active { background: #ebebeb; }

    .btn-next {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 28px;
      font-family: 'Lato', Arial, sans-serif;
      font-size: 13px; font-weight: 700;
      color: #fff;
      background: #3b8ad4;
      border: 1.5px solid #3b8ad4;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      min-width: 90px;
    }
    .btn-next:hover  { background: #2f74bb; border-color: #2f74bb; }
    .btn-next:active { background: #2563a3; border-color: #2563a3; }
    .btn-next svg    { width: 13px; height: 13px; }

    .btn-next:disabled, .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading / error states ── */
    .state-loading, .state-error {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 16px; gap: 10px;
      color: #888; font-size: 13px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #e0e0e0;
      border-top-color: #3a9e5f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon  { font-size: 24px; }
    .state-error { color: #c0392b; }

    #widget-content { display: none; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="state-loading" class="state-loading">
    <div class="spinner"></div>
    <span>Checking infrastructure…</span>
  </div>

  <!-- Error -->
  <div id="state-error" class="state-error" style="display:none;">
    <div class="error-icon">⚠</div>
    <span id="error-msg">Unable to load service data.</span>
  </div>

  <!-- Widget -->
  <div id="widget-content">

    <div class="section-header">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;flex-shrink:0;">
        <path d="M1.5 7C3.5 4.8 5.6 3.8 8 3.8C10.4 3.8 12.5 4.8 14.5 7" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M3.5 9.5C5 7.8 6.4 7 8 7C9.6 7 11 7.8 12.5 9.5" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M5.5 12C6.4 10.8 7.1 10.3 8 10.3C8.9 10.3 9.6 10.8 10.5 12" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="8" cy="13.5" r="0.8" fill="#888"/>
      </svg>
      <span class="section-title">Fiber Service Details</span>
      <div class="section-line"></div>
    </div>

    <div class="card-wrapper">
    <div class="zoho-card">
      <div class="card-header" id="card-header">
        <div class="card-header-left">
          <div class="pulse-dot" id="pulse-dot"></div>
          <div>
            <div class="header-title" id="header-title">Fiber Service Available</div>
            <div class="header-sub" id="address-line">Loading address...</div>
          </div>
        </div>
        <div class="header-badge" id="header-badge">ACTIVE</div>
      </div>

      <div class="fields-grid">
        <div class="field-cell">
          <div class="field-label">Optical Wiring</div>
          <div class="field-value" id="optical-wiring">—</div>
        </div>

        <div class="field-cell">
          <div class="field-label">Connection Type</div>
          <div class="field-value muted">Fiber Optic</div>
        </div>

        <div class="field-cell">
          <div class="field-label">Max Fiber Speed</div>
          <div class="field-value" id="fiber-speed">—</div>
        </div>

        <div class="field-cell">
          <div class="field-label">Max Copper Speed</div>
          <div class="field-value" id="copper-speed">—</div>
        </div>
      </div>

      <div class="card-footer">
        <div class="footer-dot"></div>
        <span class="footer-text">Service verified for this address</span>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn-cancel" id="btn-cancel" onclick="handleCancel()">Cancel</button>
      <button class="btn-next" id="btn-next" onclick="handleNext()">
        Next
        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 6H9.5M6.5 3L9.5 6L6.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    </div><!-- /card-wrapper -->
  </div>

  <script>
    function showLoading() {
      document.getElementById('state-loading').style.display = 'flex';
      document.getElementById('state-error').style.display = 'none';
      document.getElementById('widget-content').style.display = 'none';
    }

    function showError(msg) {
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('state-error').style.display = 'flex';
      document.getElementById('widget-content').style.display = 'none';
      document.getElementById('error-msg').textContent = msg || 'Unable to load service data.';
    }

    function showWidget() {
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('state-error').style.display = 'none';
      document.getElementById('widget-content').style.display = 'block';
    }

    function renderOpticalWiring(value) {
      if (value === 'Available') {
        return `<span class="confirmed-badge">
          <span class="check-circle">
            <svg viewBox="0 0 8 8" fill="none">
              <path d="M1.5 4L3.2 5.8L6.5 2.2" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Available
        </span>`;
      }
      return `<span style="color:#c0392b;font-weight:600;">Unavailable</span>`;
    }

    var _entityId = null;

    ZOHO.embeddedApp.on("PageLoad", function(data) {
      var entityId = data.EntityId;
      _entityId = entityId;

      // Fetch the Deal record to get address fields
      ZOHO.CRM.API.getRecord({ Entity: "Deals", RecordID: entityId })
        .then(function(recordData) {
          var record = recordData.data && recordData.data[0];
          if (!record) { showError('Deal record not found.'); return; }

       
  var address = record['Full_Address']   || '';
          document.getElementById('address-line').textContent = address || 'No address on record';

          // Hardcoded infrastructure values — no external function needed
          window._infraResult = {
            Fibers_Available: 'Available',
            Fiber_Max_Speed:  '1GB',
            Copper_Max_Speed: '250kbs'
          };

          // Always show as active
          document.getElementById('card-header').classList.remove('inactive');
          document.getElementById('pulse-dot').classList.remove('inactive');
          document.getElementById('header-badge').textContent = 'ACTIVE';
          document.getElementById('header-title').textContent = 'Fiber Service Available';

          document.getElementById('optical-wiring').innerHTML = renderOpticalWiring('Available');
          document.getElementById('fiber-speed').innerHTML   = '<span class="speed-tag">1GB</span>';
          document.getElementById('copper-speed').innerHTML  = '<span class="speed-tag copper">250kbs</span>';

          showWidget();

          // Auto-save and advance blueprint immediately on load
          ZOHO.CRM.API.updateRecord({
            Entity:   "Deals",
            APIData: {
              id:               _entityId,
              Fibers_Available: window._infraResult.Fibers_Available,
              Fiber_Max_Speed:  window._infraResult.Fiber_Max_Speed,
              Copper_Max_Speed: window._infraResult.Copper_Max_Speed
            },
            Trigger: []
          })
          .then(function(updateResp) {
            console.log('Auto update response:', updateResp);
          })
          .catch(function(err) {
            console.error('Auto proceed error:', err);
          });
        })
        .catch(function(err) {
          console.error('Record fetch error:', err);
          showError('Could not load deal record.');
        });
    });

    function handleCancel() {
      ZOHO.CRM.UI.Popup.close();
    }

    function handleNext() {
      var btnNext   = document.getElementById('btn-next');
      var btnCancel = document.getElementById('btn-cancel');

      btnNext.disabled    = true;
      btnCancel.disabled  = true;
      btnNext.textContent = 'Saving…';

      var fields = window._infraResult || {};

      // Step 1 — update Deal fields
      ZOHO.CRM.API.updateRecord({
        Entity:   "Deals",
        APIData: {
          id:               _entityId,
          Fibers_Available: fields.Fibers_Available,
          Fiber_Max_Speed:  fields.Fiber_Max_Speed,
          Copper_Max_Speed: fields.Copper_Max_Speed
        },
        Trigger: []
      })
      .then(function(updateResp) {
        console.log('Deal update response:', updateResp);
        btnNext.textContent = 'Moving…';

        // Immediately proceed blueprint as soon as data is saved
        ZOHO.CRM.BLUEPRINT.proceed().then(function(blueprintResp) {
          console.log('Blueprint proceed response:', blueprintResp);
          ZOHO.CRM.UI.Popup.closeReload().then(function(data) {
            console.log(data);
          });
          setTimeout(function() { ZOHO.CRM.UI.Popup.close(); }, 2000);
        });
      })
      .catch(function(err) {
        console.error('Next error:', err);
        btnNext.disabled   = false;
        btnCancel.disabled = false;
        btnNext.innerHTML  = 'Next <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 6H9.5M6.5 3L9.5 6L6.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        showError('Save failed: ' + (err && err.message ? err.message : JSON.stringify(err)));
      });
    }

    ZOHO.embeddedApp.init();
  </script>
</body>
</html>
