

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script src="https://live.zwidgets.com/js-sdk/1.5/ZohoEmbededAppSDK.min.js"></script>
  </head>
  <body>
    <h2>Coql details</h2>
    <div id="output"></div> 

    <script>
      ZOHO.embeddedApp.on("PageLoad", function (data) 
	  {
		const config = {
		select_query: "select Last_Name, First_Name, Full_Name from Contacts where First_Name is not null limit 2"
	};
		if (ZOHO.CRM && ZOHO.CRM.API && typeof ZOHO.CRM.API.coql === "function") 
		{

			ZOHO.CRM.API.coql(config)
				.then(function(data) {
					console.log(data);
						console.log(data);
			document.getElementById("output").innerHTML = JSON.stringify(data.data);
				})
				.catch(function(error) {
					console.error("COQL request failed", error);
				});
			return;
			
		}


        ZOHO.CRM.UI.Widget.open();  // Open the widget after loading the user info
      });
      ZOHO.embeddedApp.init();  // Initialize the Zoho embedded app
    </script>
  </body>
</html>
