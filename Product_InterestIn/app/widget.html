
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        padding: 20px;
        background-color: #f5f7fa;
    }
    
    .container {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .section-title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        margin-bottom: 15px;
    }
    
    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 30px;
    }
    
    .interest-btn {
        padding: 12px 24px;
        border: 2px solid #ccc;
        border-radius: 8px;
        background-color: #e8e8e8;
        color: #333;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        outline: none;
    }
    
    .interest-btn:hover {
        border-color: #2c5f7f;
        background-color: #d0d0d0;
    }
    
    .interest-btn.active {
        background-color: #2c5f7f;
        border-color: #2c5f7f;
        color: white;
    }
    
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    
    .product-card {
        padding: 20px;
        border: 2px solid #ccc;
        border-radius: 12px;
        background-color: #e8e8e8;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
    }
    
    .product-card:hover {
        border-color: #2c5f7f;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    .product-card.selected {
        background-color: #2c5f7f;
        border-color: #2c5f7f;
        color: white;
    }
    
    .product-name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
    }
    
    .product-price {
        font-size: 14px;
        margin-bottom: 5px;
    }
    
    .product-price-after {
        font-size: 13px;
        margin-bottom: 10px;
    }
    
    .product-description {
        font-size: 12px;
        line-height: 1.5;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(255,255,255,0.3);
    }
    
    .loading {
        text-align: center;
        padding: 20px;
        color: #666;
    }
    
    .no-data {
        text-align: center;
        padding: 40px;
        color: #999;
        font-size: 14px;
    }
    
    .error {
        background-color: #fee;
        border: 1px solid #fcc;
        padding: 15px;
        border-radius: 8px;
        color: #c33;
        margin-bottom: 20px;
    }
</style>
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
<script>
    var selectedProducts = [];
    
    /* Subscribe to the EmbeddedApp onPageLoad event before initializing */
    ZOHO.embeddedApp.on("PageLoad", function (data) {
        console.log("Widget loaded", data);
        loadInterestedInOptions();
    });
    
    /* Load picklist options from Interested_In field in Leads module */
    function loadInterestedInOptions() {
        ZOHO.CRM.META.getFields({Entity: "Leads"})
            .then(function(response) {
                console.log("Fields response:", response);
                var fields = response.fields;
                var interestedInField = fields.find(function(field) {
                    return field.api_name === "Interested_In";
                });
                
                if (interestedInField && interestedInField.pick_list_values) {
                    displayInterestButtons(interestedInField.pick_list_values);
                } else {
                    document.getElementById('interest-buttons').innerHTML = 
                        '<div class="error">Interested_In field not found or has no options</div>';
                }
            })
            .catch(function(error) {
                console.error("Error fetching fields:", error);
                document.getElementById('interest-buttons').innerHTML = 
                    '<div class="error">Error loading options: ' + JSON.stringify(error) + '</div>';
            });
    }
    
    /* Display interest buttons */
    function displayInterestButtons(options) {
        var container = document.getElementById('interest-buttons');
        container.innerHTML = '';
        
        options.forEach(function(option) {
            var button = document.createElement('button');
            button.className = 'interest-btn';
            button.textContent = option.display_value || option.actual_value;
            button.setAttribute('data-value', option.actual_value);
            button.onclick = function() {
                selectInterest(this);
            };
            container.appendChild(button);
        });
    }
    
    /* Handle interest button selection */
    function selectInterest(button) {
        // Remove active class from all buttons
        var buttons = document.querySelectorAll('.interest-btn');
        buttons.forEach(function(btn) {
            btn.classList.remove('active');
        });
        
        // Add active class to clicked button
        button.classList.add('active');
        
        // Get selected value and fetch products
        var selectedValue = button.getAttribute('data-value');
        fetchProducts(selectedValue);
    }
    
    /* Fetch products based on selected interest */
    function fetchProducts(productCategory) {
        var productsContainer = document.getElementById('products-grid');
        productsContainer.innerHTML = '<div class="loading">Loading products...</div>';
        
        var safeCategory = (productCategory || '').replace(/'/g, "\\'");
        var fields = ["Product_Name", "Unit_Price", "Unit_Price_2nd_period", "Lead_Product_Description", "id"];
        var api = ZOHO && ZOHO.CRM && ZOHO.CRM.API ? ZOHO.CRM.API : null;
        
        if (api && typeof api.coql === "function") {
            var config = {
                "select_query": "select Product_Name, Unit_Price, Unit_Price_2nd_period, Lead_Product_Description from Products where ((Usage_Unit = 'Monthly Package') and (Product_Category = '" + safeCategory + "'))"
            };
            
            api.coql(config)
                .then(function(response) {
                    console.log("Products response:", response);
                    if (response.data && response.data.length > 0) {
                        displayProducts(response.data);
                    } else {
                        productsContainer.innerHTML = '<div class="no-data">No products found for this category</div>';
                    }
                })
                .catch(function(error) {
                    console.error("Error fetching products:", error);
                    productsContainer.innerHTML = '<div class="error">Error loading products: ' + JSON.stringify(error) + '</div>';
                });
            return;
        }
        
        if (!api || typeof api.searchRecord !== "function") {
            productsContainer.innerHTML = '<div class="error">CRM API not available to fetch products</div>';
            return;
        }
        
        var criteria = "((Usage_Unit:equals:Monthly Package) and (Product_Category:equals:" + safeCategory + "))";
        api.searchRecord({
            Entity: "Products",
            Type: "criteria",
            Criteria: criteria,
            fields: fields.join(",")
        })
            .then(function(response) {
                console.log("Products response:", response);
                if (response.data && response.data.length > 0) {
                    displayProducts(response.data);
                } else {
                    productsContainer.innerHTML = '<div class="no-data">No products found for this category</div>';
                }
            })
            .catch(function(error) {
                console.error("Error fetching products:", error);
                productsContainer.innerHTML = '<div class="error">Error loading products: ' + JSON.stringify(error) + '</div>';
            });
    }
    
    /* Display products as clickable cards */
    function displayProducts(products) {
        var container = document.getElementById('products-grid');
        container.innerHTML = '';
        
        products.forEach(function(product) {
            var card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-product-id', product.id);
            
            var productName = product.Product_Name || '[Product Name]';
            var unitPrice = product.Unit_Price || '[Product. Unit Price]';
            var unitPrice2nd = product.Unit_Price_2nd_period || '[Product. Unit Price 2nd period]';
            var description = product.Lead_Product_Description || '[Lead Product Description]';
            
            card.innerHTML = `
                <div class="product-name">${productName}</div>
                <div class="product-price">1st 12 Months: ${unitPrice} ILS</div>
                <div class="product-price-after">There after: ${unitPrice2nd} ILS</div>
                <div style="margin: 10px 0;">---------------</div>
                <div class="product-description">${description}</div>
            `;
            
            card.onclick = function() {
                toggleProductSelection(this, product);
            };
            
            container.appendChild(card);
        });
    }
    
    /* Toggle product selection */
    function toggleProductSelection(card, product) {
        var productId = card.getAttribute('data-product-id');
        var index = selectedProducts.findIndex(function(p) { return p.id === productId; });
        
        if (index > -1) {
            // Deselect
            selectedProducts.splice(index, 1);
            card.classList.remove('selected');
        } else {
            // Select
            selectedProducts.push(product);
            card.classList.add('selected');
        }
        
        console.log("Selected products:", selectedProducts);
    }
    
    /* Initialize the widget and start listening to CRM events. */
    ZOHO.embeddedApp.init();
</script>
</head>
<body>
<div class="container">
    <div class="section-title">Interested In</div>
    <div id="interest-buttons" class="button-group">
        <div class="loading">Loading options...</div>
    </div>
    
    <div class="section-title">Main Package</div>
    <div id="products-grid" class="products-grid">
        <div class="no-data">Select an interest category above to view products</div>
    </div>
</div>
</body>
</html>
