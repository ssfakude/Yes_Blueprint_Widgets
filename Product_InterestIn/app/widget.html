<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --navy: #0f1f35;
        --navy-mid: #162840;
        --navy-light: #1e3a52;
        --accent: #3b9eca;
        --accent-bright: #4db8e8;
        --accent-glow: rgba(59, 158, 202, 0.15);
        --gold: #e8b84b;
        --surface: #f0f4f8;
        --surface-card: #ffffff;
        --text-primary: #0f1f35;
        --text-secondary: #4a6080;
        --text-muted: #8ba3bc;
        --border: #d4e0ec;
        --border-active: #3b9eca;
        --shadow-sm: 0 1px 3px rgba(15,31,53,0.06), 0 1px 2px rgba(15,31,53,0.04);
        --shadow-md: 0 4px 16px rgba(15,31,53,0.08), 0 2px 6px rgba(15,31,53,0.05);
        --shadow-lg: 0 12px 40px rgba(15,31,53,0.12), 0 4px 12px rgba(15,31,53,0.06);
        --radius: 10px;
        --radius-sm: 6px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Sora', sans-serif;
        background: var(--surface);
        color: var(--text-primary);
        padding: 24px;
        min-height: 100vh;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Header strip */
    .widget-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .widget-header .icon {
        width: 34px;
        height: 34px;
        background: var(--navy);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .widget-header .icon svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: var(--accent-bright);
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .widget-header h1 {
        font-size: 15px;
        font-weight: 600;
        color: var(--navy);
        letter-spacing: -0.01em;
    }

    .widget-header p {
        font-size: 12px;
        color: var(--text-muted);
        margin-left: auto;
        font-weight: 400;
    }

    /* Section label */
    .section-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    /* Interest buttons */
    .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 32px;
    }

    .interest-btn {
        padding: 8px 18px;
        border: 1.5px solid var(--border);
        border-radius: 50px;
        background: var(--surface-card);
        color: var(--text-secondary);
        font-family: 'Sora', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        outline: none;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
    }

    .interest-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: var(--accent-glow);
        opacity: 0;
        transition: opacity 0.2s;
    }

    .interest-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .interest-btn:hover::before {
        opacity: 1;
    }

    .interest-btn.active {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
        box-shadow: 0 4px 14px rgba(15,31,53,0.2);
    }

    .interest-btn.active::before {
        opacity: 0;
    }

    /* Products grid */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
    }

    /* Product card */
    .product-card {
        background: var(--surface-card);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 0;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        position: relative;
    }

    .product-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent-bright));
        opacity: 0;
        transition: opacity 0.25s;
    }

    .product-card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
    }

    .product-card:hover::before {
        opacity: 1;
    }

    .product-card.selected {
        border-color: var(--navy);
        box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-md);
    }

    .product-card.selected::before {
        background: linear-gradient(90deg, var(--navy), var(--accent));
        opacity: 1;
    }

    .card-inner {
        padding: 20px;
    }

    .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 14px;
    }

    .product-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.35;
        flex: 1;
        padding-right: 12px;
    }

    .selected-badge {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
    }

    .product-card.selected .selected-badge {
        background: var(--navy);
        border-color: var(--navy);
    }

    .selected-badge svg {
        width: 11px;
        height: 11px;
        stroke: white;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .product-card.selected .selected-badge svg {
        opacity: 1;
    }

    /* Pricing block */
    .pricing-block {
        background: var(--surface);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .price-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
    }

    .price-label {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
    }

    .price-value {
        font-family: 'DM Mono', monospace;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
    }

    .price-currency {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 400;
        margin-left: 2px;
    }

    .price-divider {
        height: 1px;
        background: var(--border);
        margin: 2px 0;
    }

    .price-row.secondary .price-value {
        font-size: 12.5px;
        color: var(--text-secondary);
    }

    /* Description */
    .product-description {
        font-size: 12px;
        line-height: 1.6;
        color: var(--text-secondary);
        border-top: 1px solid var(--border);
        padding-top: 12px;
        margin-top: 2px;
    }

    /* States */
    .state-box {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        background: var(--surface-card);
        border: 1.5px dashed var(--border);
        border-radius: var(--radius);
        gap: 10px;
    }

    .state-box svg {
        width: 32px;
        height: 32px;
        stroke: var(--text-muted);
        stroke-width: 1.5;
        fill: none;
        opacity: 0.6;
    }

    .state-box p {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 400;
    }

    .loading-dots {
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .loading-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
    }

    .error-box {
        grid-column: 1 / -1;
        background: #fff5f5;
        border: 1.5px solid #fecaca;
        border-radius: var(--radius);
        padding: 16px 18px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }

    .error-box svg {
        width: 18px;
        height: 18px;
        stroke: #ef4444;
        stroke-width: 2;
        fill: none;
        flex-shrink: 0;
        margin-top: 1px;
    }

    .error-box p {
        font-size: 12.5px;
        color: #b91c1c;
        line-height: 1.5;
    }

    /* Selection count bar */
    .selection-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--navy);
        color: white;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 500;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 -4px 20px rgba(15,31,53,0.2);
    }

    .selection-bar.visible {
        transform: translateY(0);
    }

    .selection-bar .count-badge {
        background: var(--accent);
        color: white;
        font-size: 11px;
        font-weight: 700;
        font-family: 'DM Mono', monospace;
        padding: 2px 8px;
        border-radius: 50px;
        margin-left: 8px;
    }

    /* Description field */
    .description-field {
        width: 100%;
        min-height: 90px;
        padding: 12px 14px;
        font-family: 'Sora', sans-serif;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--surface-card);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        resize: vertical;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        box-shadow: var(--shadow-sm);
        margin-bottom: 20px;
        line-height: 1.6;
    }
    .description-field::placeholder { color: var(--text-muted); }
    .description-field:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .bottom-section {
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
    }

    .action-bar {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        padding: 4px 0 8px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        font-family: 'Sora', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 0.01em;
    }
    .action-btn svg {
        width: 15px; height: 15px;
        stroke: currentColor; stroke-width: 2.2;
        fill: none; stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .action-btn:active { transform: translateY(0); }

    .btn-cancel { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
    .btn-cancel:hover { background: #e8edf3; border-color: #b0bfce; box-shadow: var(--shadow-md); }

    .btn-danger  { background: #ef4444; color: white; box-shadow: 0 2px 8px rgba(239,68,68,0.25); }
    .btn-danger:hover  { background: #dc2626; box-shadow: 0 6px 16px rgba(239,68,68,0.3); }
    .btn-success { background: #22c55e; color: white; box-shadow: 0 2px 8px rgba(34,197,94,0.25); }
    .btn-success:hover { background: #16a34a; box-shadow: 0 6px 16px rgba(34,197,94,0.3); }
    .btn-warning { background: #ef4444; color: white; box-shadow: 0 2px 8px rgba(239,68,68,0.25); }
    .btn-warning:hover { background: #dc2626; box-shadow: 0 6px 16px rgba(239,68,68,0.3); }

    .action-btn svg.spin {
        animation: spinIcon 0.8s linear infinite;
        stroke-linecap: round;
    }

    @keyframes spinIcon {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
    }

    .action-btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none !important;
    }

    .btn-loading {
        pointer-events: none;
    }

    /* Toast notification */
    .toast {
        position: fixed;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        background: var(--navy);
        color: white;
        font-size: 13px;
        font-weight: 500;
        padding: 10px 20px;
        border-radius: 50px;
        box-shadow: var(--shadow-lg);
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        white-space: nowrap;
        z-index: 200;
    }

    .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    .toast.toast-error {
        background: #ef4444;
    }

    .toast.toast-success {
        background: #16a34a;
    }

    /* Required field error states */
    .field-error .interest-btn:not(.active),
    .button-group.field-error {
        animation: shakeX 0.4s ease;
    }

    .description-field.field-error {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
        animation: shakeX 0.4s ease;
    }

    .products-grid.field-error {
        animation: shakeX 0.4s ease;
    }

    .products-grid.field-error .state-box,
    .products-grid.field-error .product-card {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239,68,68,0.1);
    }

    .button-group.field-error .interest-btn {
        border-color: #ef4444;
    }

    .required-star {
        color: #ef4444;
        margin-left: 3px;
        font-size: 12px;
    }

    @keyframes shakeX {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-5px); }
        40%       { transform: translateX(5px); }
        60%       { transform: translateX(-4px); }
        80%       { transform: translateX(4px); }
    }

    /* Card appear animation */
    .product-card {
        animation: cardIn 0.3s ease both;
    }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .button-group .interest-btn {
        animation: btnIn 0.25s ease both;
    }

    @keyframes btnIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
    }
</style>
<script src="https://live.zwidgets.com/js-sdk/1.5/ZohoEmbededAppSDK.min.js"></script>
<script>
    // ─── State ───────────────────────────────────────────────────────────────
    var selectedProducts = [];
    var currentLeadId    = null;
    var isProcessing     = false;

    // ─── Boot ─────────────────────────────────────────────────────────────────
    ZOHO.embeddedApp.on("PageLoad", function (data) {
        console.log("🚀 [PageLoad] Raw data received:", data);
        console.log("🚀 [PageLoad] EntityId:", data && data.EntityId);
        console.log("🚀 [PageLoad] Full data keys:", data ? Object.keys(data) : "no data");

        // Grab the lead ID from the page-load payload
        if (data && data.EntityId) {
            currentLeadId = data.EntityId;
        } else if (data && data.ID) {
            currentLeadId = data.ID;
        }

        console.log("🪪 [PageLoad] currentLeadId set to:", currentLeadId);

        loadInterestedInOptions();
    });

    ZOHO.embeddedApp.init();

    // ─── Load "Interested In" picklist ────────────────────────────────────────
    function loadInterestedInOptions() {
        console.log("📡 [META] Fetching Leads fields from Zoho CRM...");

        ZOHO.CRM.META.getFields({ Entity: "Leads" })
            .then(function (response) {
                console.log("📋 [META] Full getFields response:", response);
                console.log("📋 [META] Total fields returned:", response.fields ? response.fields.length : 0);
                console.log("📋 [META] All field api_names:", response.fields ? response.fields.map(function(f){ return f.api_name; }) : []);

                var fields = response.fields;
                var field  = fields.find(function (f) { return f.api_name === "Interested_In"; });

                if (field) {
                    console.log("✅ [META] Interested_In field found:", field);
                    console.log("🎯 [META] Interested_In pick_list_values:", field.pick_list_values);
                } else {
                    console.warn("⚠️ [META] Interested_In field NOT found in response");
                }

                if (field && field.pick_list_values) {
                    displayInterestButtons(field.pick_list_values);
                } else {
                    showButtonError("Interested_In field not found or has no options");
                }
            })
            .catch(function (err) {
                console.error("❌ [META] getFields failed:", err);
                showButtonError("Error loading options: " + JSON.stringify(err));
            });
    }

    // ─── Render interest buttons ──────────────────────────────────────────────
    function showButtonError(msg) {
        console.error("❌ [UI] showButtonError:", msg);
        document.getElementById("interest-buttons").innerHTML =
            '<div class="error-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>' + msg + "</p></div>";
    }

    function displayInterestButtons(options) {
        console.log("🖼️ [UI] Rendering interest buttons. Options count:", options.length);
        console.log("🖼️ [UI] Interest button options:", options);

        var container = document.getElementById("interest-buttons");
        container.innerHTML = "";
        options.forEach(function (option, i) {
            var btn = document.createElement("button");
            btn.className = "interest-btn";
            btn.style.animationDelay = (i * 0.04) + "s";
            btn.textContent = option.display_value || option.actual_value;
            btn.setAttribute("data-value", option.actual_value);
            btn.onclick = function () { selectInterest(this); };
            container.appendChild(btn);
        });
    }

    function selectInterest(button) {
        var value = button.getAttribute("data-value");
        var label = button.textContent;

        console.log("🖱️ [Click] Interest button clicked:", { value: value, label: label });

        document.querySelectorAll(".interest-btn").forEach(function (b) { b.classList.remove("active"); });
        button.classList.add("active");
        document.getElementById("interest-buttons").classList.remove("field-error");

        console.log("🔍 [Click] Fetching products for category:", value);
        fetchProducts(value);
    }

    // ─── Fetch products via COQL ──────────────────────────────────────────────
    function fetchProducts(category) {
        var query = "select Product_Name, Unit_Price, Unit_Price_2nd_period, Description from Products where ((Usage_Unit = 'Monthly Package') and (Product_Category = '" + category + "'))";
        console.log("📡 [COQL] Running query:", query);

        var container = document.getElementById("products-grid");
        container.innerHTML = '<div class="state-box"><div class="loading-dots"><span></span><span></span><span></span></div><p>Loading products…</p></div>';

        ZOHO.CRM.API.coql({ select_query: query })
        .then(function (response) {
            console.log("📦 [COQL] Raw response:", response);
            console.log("📦 [COQL] Products count:", response.data ? response.data.length : 0);
            console.log("📦 [COQL] Products data:", response.data);

            if (response.data && response.data.length > 0) {
                response.data.forEach(function(product, i) {
                    console.log("📦 [COQL] Product[" + i + "]:", {
                        id:                    product.id,
                        Product_Name:          product.Product_Name,
                        Unit_Price:            product.Unit_Price,
                        Unit_Price_2nd_period: product.Unit_Price_2nd_period,
                        Description:           product.Description
                    });
                });
                displayProducts(response.data);
            } else {
                console.warn("⚠️ [COQL] No products found for category:", category);
                container.innerHTML = '<div class="state-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><p>No products found for this category</p></div>';
            }
        })
        .catch(function (err) {
            console.error("❌ [COQL] Query failed:", err);
            container.innerHTML = '<div class="error-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Error loading products: ' + JSON.stringify(err) + '</p></div>';
        });
    }

    // ─── Render product cards ─────────────────────────────────────────────────
    function formatPrice(val) {
        if (!val && val !== 0) return "—";
        return Number(val).toLocaleString("en-IL");
    }

    function displayProducts(products) {
        console.log("🖼️ [UI] Rendering", products.length, "product card(s)");

        var container = document.getElementById("products-grid");
        container.innerHTML = "";
        products.forEach(function (product, i) {
            var card = document.createElement("div");
            card.className = "product-card";
            card.style.animationDelay = (i * 0.06) + "s";
            card.setAttribute("data-product-id", product.id);

            var name    = product.Product_Name || "Unnamed Product";
            var price1  = formatPrice(product.Unit_Price);
            var price2  = formatPrice(product.Unit_Price_2nd_period);
            var desc    = product.Description || "";

            card.innerHTML =
                '<div class="card-inner">' +
                  '<div class="card-header">' +
                    '<div class="product-name">' + name + '</div>' +
                    '<div class="selected-badge"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>' +
                  '</div>' +
                  '<div class="pricing-block">' +
                    '<div class="price-row"><span class="price-label">First 12 months</span><span class="price-value">' + price1 + '<span class="price-currency">ILS</span></span></div>' +
                    '<div class="price-divider"></div>' +
                    '<div class="price-row secondary"><span class="price-label">Thereafter</span><span class="price-value">' + price2 + '<span class="price-currency">ILS</span></span></div>' +
                  '</div>' +
                  (desc ? '<div class="product-description">' + desc + '</div>' : '') +
                '</div>';

            card.onclick = function () { toggleProductSelection(this, product); };
            container.appendChild(card);
        });
    }

    function toggleProductSelection(card, product) {
        var id        = card.getAttribute("data-product-id");
        var isAlready = card.classList.contains("selected");

        console.log("🖱️ [Click] Product card clicked:", {
            id:           id,
            Product_Name: product.Product_Name,
            Unit_Price:   product.Unit_Price,
            wasSelected:  isAlready
        });

        // If already selected, deselect it
        if (isAlready) {
            selectedProducts = [];
            card.classList.remove("selected");
            console.log("❎ [Selection] Product deselected. selectedProducts:", selectedProducts);
            updateSelectionBar();
            return;
        }

        // Deselect any previously selected card
        document.querySelectorAll(".product-card.selected").forEach(function (c) {
            c.classList.remove("selected");
        });

        // Select the new one
        selectedProducts = [product];
        card.classList.add("selected");
        document.getElementById("products-grid").classList.remove("field-error");

        console.log("✅ [Selection] Product selected:", product);
        console.log("📌 [Selection] Current selectedProducts:", selectedProducts);

        updateSelectionBar();
    }

    function updateSelectionBar() {
        var bar   = document.getElementById("selection-bar");
        var count = document.getElementById("selection-count");
        if (selectedProducts.length > 0) {
            count.textContent = selectedProducts.length;
            bar.classList.add("visible");
        } else {
            bar.classList.remove("visible");
        }
    }

    // ─── UI feedback helpers ──────────────────────────────────────────────────
    function setButtonState(action, state) {
        var btn = document.querySelector('.action-btn[data-action="' + action + '"]');
        if (!btn) return;

        var configs = {
            matching_process: {
                idle:    { icon: '<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>', label: "Next" },
                loading: { icon: '<svg viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="10"/></svg>', label: "Saving…" },
                done:    { icon: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>', label: "Proceeding…" },
                error:   { icon: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>', label: "Failed – retry" }
            }
        };

        var cfg = configs[action] && configs[action][state];
        if (!cfg) return;
        btn.innerHTML    = cfg.icon + " " + cfg.label;
        btn.disabled     = (state === "loading");
        btn.classList.toggle("btn-loading", state === "loading");
    }

    function showToast(msg, type) {
        var toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className   = "toast toast-" + (type || "success") + " visible";
        clearTimeout(toast._t);
        toast._t = setTimeout(function () { toast.classList.remove("visible"); }, 3500);
    }

    // ─── Build the lead update payload ───────────────────────────────────────
    function buildLeadPayload(statusValue) {
        var description   = document.getElementById("lead-description").value.trim();
        var interestedBtn = document.querySelector(".interest-btn.active");
        var interestedIn  = interestedBtn ? interestedBtn.getAttribute("data-value") : null;

        var payload = { id: currentLeadId };

        if (statusValue) {
            payload.Lead_Status = statusValue;
        }

        payload.Description   = description;

        if (interestedIn) {
            payload.Interested_In = interestedIn;
        }

        payload.Product_Offerd = selectedProducts.length > 0 ? selectedProducts[0].id : null;

        console.log("🏗️ [Payload] Built lead payload:", payload);
        return payload;
    }

    // ─── Validation ───────────────────────────────────────────────────────────
    function validate() {
        var errors = [];

        var interestedBtn = document.querySelector(".interest-btn.active");
        if (!interestedBtn) {
            errors.push("interested");
            document.getElementById("interest-buttons").classList.add("field-error");
        } else {
            document.getElementById("interest-buttons").classList.remove("field-error");
        }

        if (selectedProducts.length === 0) {
            errors.push("product");
            document.getElementById("products-grid").classList.add("field-error");
        } else {
            document.getElementById("products-grid").classList.remove("field-error");
        }

        var description = document.getElementById("lead-description").value.trim();
        if (!description) {
            errors.push("description");
            document.getElementById("lead-description").classList.add("field-error");
        } else {
            document.getElementById("lead-description").classList.remove("field-error");
        }

        if (errors.length > 0) {
            console.warn("⚠️ [Validation] Failed. Missing fields:", errors);
            var msgs = {
                interested:  "Please select an interest category",
                product:     "Please select a package",
                description: "Please enter a description"
            };
            showToast(msgs[errors[0]], "error");
            return false;
        }

        console.log("✅ [Validation] Passed. All required fields present.");
        return true;
    }

    // ─── Core: update lead record ─────────────────────────────────────────────
    function updateLeadRecord(payload) {
        console.log("📡 [CRM] Calling updateRecord with payload:", payload);
        return ZOHO.CRM.API.updateRecord({
            Entity : "Leads",
            APIData: payload,
            Trigger: []
        });
    }

    // ─── Action handlers ──────────────────────────────────────────────────────

    function handleCancel() {
        console.log("🖱️ [Click] Cancel button clicked. Closing popup.");
        ZOHO.CRM.UI.Popup.close();
    }

    /**
     * NEXT (Matching Process)
     * 1. Validate all mandatory fields
     * 2. Save: Description, Interested_In, Product_Offerd
     * 3. Proceed blueprint
     */
    function handleMatchingProcess() {
        console.log("🖱️ [Click] Next (Matching Process) button clicked.");
        console.log("🔄 [State] isProcessing:", isProcessing);

        if (isProcessing) {
            console.warn("⚠️ [Click] Already processing — ignoring duplicate click.");
            return;
        }
        if (!validate()) return;

        isProcessing = true;
        setButtonState("matching_process", "loading");

        var payload = buildLeadPayload(null);

        updateLeadRecord(payload)
            .then(function (response) {
                console.log("✅ [CRM] updateRecord success:", response);
                console.log("📡 [Blueprint] Calling ZOHO.CRM.BLUEPRINT.proceed()...");
                return ZOHO.CRM.BLUEPRINT.proceed();
            })
            .then(function (blueprintResponse) {
                console.log("✅ [Blueprint] proceed() success:", blueprintResponse);
                setButtonState("matching_process", "done");
                setTimeout(function () {
                    try { ZOHO.CRM.UI.Popup.close(); } catch (e) {
                        console.warn("⚠️ [Popup] close() failed:", e);
                    }
                }, 1200);
            })
            .catch(function (err) {
                console.error("❌ [Error] Matching process failed:", err);
                setButtonState("matching_process", "error");
                showToast("Failed: " + JSON.stringify(err), "error");
                isProcessing = false;
                setTimeout(function () { setButtonState("matching_process", "idle"); }, 2500);
            });
    }
</script>
</head>
<body>
<div class="container">

    <div class="widget-header">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <h1>Package Selector</h1>
        <p>Select a category, then choose packages</p>
    </div>

    <div class="section-label">Interested In<span class="required-star">*</span></div>
    <div id="interest-buttons" class="button-group">
        <div class="loading-dots" style="padding: 8px 0;"><span></span><span></span><span></span></div>
    </div>

    <div class="section-label">Main Package<span class="required-star">*</span></div>
    <div id="products-grid" class="products-grid">
        <div class="state-box">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <p>Select a category above to view packages</p>
        </div>
    </div>

    <!-- Description + Actions -->
    <div class="bottom-section">
        <div class="section-label" style="margin-top: 28px;">Description<span class="required-star">*</span></div>
        <textarea id="lead-description" class="description-field" placeholder="Add notes or context about this lead…" oninput="this.classList.remove('field-error')"></textarea>

        <div class="action-bar">
            <button class="action-btn btn-cancel" data-action="cancel" onclick="handleCancel()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Cancel
            </button>
            <button class="action-btn btn-success" data-action="matching_process" onclick="handleMatchingProcess()">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                Next
            </button>
        </div>
    </div>

</div>

    <span>Products selected <span class="count-badge" id="selection-count">0</span></span>
    <span style="color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 400;">Click any card to deselect</span>
</div> -->
<div id="toast" class="toast"></div>
</body>
</html>
